name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  verify-simulated:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install host tools for simulated verification
        run: |
          sudo apt-get update
          sudo apt-get install -y gjs libglib2.0-bin
          command -v glib-compile-schemas

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Run simulated verification
        run: bash scripts/verify/verify_simulated.sh
